<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <title>GameHunt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="category-panel" class="category-drawer">
        <div class="drawer-header">
            <h3>Categories</h3>
            <button id="close-drawer">&times;</button>
        </div>
        <div class="category-list"></div>
    </div>
    <div class="sidebar">
        <div class="sidebar-icon">☰</div>
        <nav class="sidebar-menu">
            <a href="index.html"><span>Home</span></a>
            <a id="floating-search-btn" class="floating-search-btn" href="#search-target"><span>Search</span></a>
            <a href="javascript:void(0)" id="open-categories"><span>Categories</span></a>
            <a href="#" id="favorites-link"><span>Favorites</span></a>
        </nav>
    </div>
    <div class="top-right-controls">
        <div class="user-menu-wrapper">
            <button class="login-btn-fixed">Login</button>
            <div id="user-dropdown" class="user-dropdown">
                <div class="user-dropdown-name" id="user-dropdown-name"></div>
                <hr class="user-dropdown-divider">
                <button class="user-dropdown-item" id="dropdown-logout">Log Out</button>
            </div>
        </div>
        <button class="theme-toggle" id="theme-toggle-btn">
            <img src="assets/brightness.png" alt="Light Mode" class="theme-icon" id="light-mode-icon">
            <img src="assets/white_moon-stars.png" alt="Dark Mode" class="theme-icon" id="dark-mode-icon">
        </button>
    </div>

    <main class="main-content">
        <div class="gamehunt-logo-container">
            <a href="index.html" class="logo-link"><h1 class="gamehunt-logo">GameHunt</h1></a>
        </div>
        <header>
            <div class="search-container" id="search-target">
                <div class="search-wrapper">
                    <input type="text" placeholder="Search for any GAME or MOD..." class="search-box" id="search-input">
                    <button class="search-btn" id="search-btn">
                    <img src="assets/search.png" alt="search" id="search-icon-dark">
                    <img src="assets/white_search.png" alt="search" id="search-icon-light">
                </button>
                </div>
            </div>
        </header>

        <section class="filter-section">
            <div class="tag-inputs">
                <div class="input-group"><input type="text" placeholder="Adding filters..."></div>
                <div class="input-group"><input type="text" placeholder="Blocking filters..."></div>
            </div>
            <div class="sliders-container">
                <div class="slider-group">
                    <div class="slider-labels"><span>Older</span><span>Newer</span></div>
                    <input type="range" class="custom-slider" id="date-slider">
                </div>
                <div class="slider-group">
                    <div class="slider-labels"><span>Niche</span><span>Popular</span></div>
                    <input type="range" class="custom-slider" id="popularity-slider">
                </div>
            </div>
        </section>
        <section class="game-list" id="game-list">
            <!--<div class="game-card">
                <img src="https://placehold.co/264x352?text=No%0AImage%0AFound" alt="Image of the game" class="game-img-placeholder">
                <div class="game-info">
                    <h3>
                        GAME
                        <span class="fav-star">☆</span>
                    </h3>
                    <p class="release-date">Release date: DD/MM/YYYY</p>
                    <div class="tags">
                        <span class="tag" ">TAG</span>
                    </div>
                    <button class="details-btn">Details</button>
                </div>
            </div>--><!--Offline tesztelésre-->

        </section>
    </main>

    <div id="image-modal" class="modal-overlay image-modal-layer">
        <button id="close-image-modal" class="close-modal image-modal-close">&times;</button>
        <button id="prev-screenshot" class="screenshot-nav-btn" aria-label="Previous">&#8249;</button>
        <div class="image-modal-center">
            <div id="screenshot-counter" class="screenshot-counter"></div>
            <img id="modal-image" src="" alt="Screenshot">
        </div>
        <button id="next-screenshot" class="screenshot-nav-btn" aria-label="Next">&#8250;</button>
    </div>

    <div id="game-details-modal" class="modal-overlay">
        <div class="modal-content game-details-content">
            <button id="close-game-details" class="close-modal">&times;</button>
            <div id="game-details-body"></div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-login" class="close-modal">&times;</button>
            <div id="login-form-container">
                <h2 style="font-size: 32px; font-weight:100;">Login</h2>
                <form id="login-form">
                    <input type="text" placeholder="Username / Email" class="modal-input" required>
                    <input type="password" placeholder="Password" class="modal-input" required>
                    <button style="letter-spacing: 2px;" type="submit" class="login-submit">Login</button>
                    <p><button type="button" id="btn-to-register" style="color: rgb(75, 75, 196); cursor: pointer; border: none;">Register</button></p>
                </form>
            </div>
            <div id="register-form-container" style="display: none;">
                <h2 style="font-size: 32px; font-weight:100;">Register</h2>
                <form id="register-form">
                    <input type="email" placeholder="Email" class="modal-input" required>
                    <input type="text" placeholder="Username" class="modal-input" required>
                    <input type="password" placeholder="Password" class="modal-input" required>
                    <button type="submit" class="login-submit">Create Account</button>
                    <button type="button" id="btn-to-login" class="login-submit" style="color: var(--based-on-theme); background: #252a3300; border: 1px solid var(--accent-blue);">Back to Login</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
    <script src="user.js"></script>
    <script src="gameapi.js"></script>
    <script src="theme.js"></script>
    <script src="game_details.js"></script>
</body>
</html>
